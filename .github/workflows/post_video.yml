name: Build Video and Send URL to Make

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-video-and-send-url
  cancel-in-progress: true

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build final video
        run: python scripts/build_video.py

      - name: Verify output exists
        run: |
          test -f output.mp4 || (echo "output.mp4 not found" && exit 1)
          ls -lh output.mp4

      - name: Get or create rolling release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "latest-video";

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              });

              core.setOutput("release_id", String(existing.data.id));
              core.setOutput("upload_url", existing.data.upload_url.replace("{?name,label}", ""));
              core.setOutput("html_url", existing.data.html_url);
            } catch (error) {
              if (error.status !== 404) throw error;

              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: "Latest Video",
                draft: false,
                prerelease: false,
                generate_release_notes: false
              });

              core.setOutput("release_id", String(created.data.id));
              core.setOutput("upload_url", created.data.upload_url.replace("{?name,label}", ""));
              core.setOutput("html_url", created.data.html_url);
            }

      - name: Delete old output asset if present
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const release_id = Number(process.env.RELEASE_ID);

            const assets = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id,
              per_page: 100
            });

            for (const asset of assets.data) {
              if (asset.name === "output.mp4") {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id
                });
              }
            }

      - name: Upload new output asset
        id: upload
        env:
          GITHUB_TOKEN: ${{ github.token }}
          UPLOAD_URL: ${{ steps.release.outputs.upload_url }}
        run: |
          RESPONSE=$(curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: video/mp4" \
            --data-binary @output.mp4 \
            "${UPLOAD_URL}?name=output.mp4")

          echo "$RESPONSE" > upload_response.json
          python - <<'PY'
          import json
          with open("upload_response.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          print(f"browser_download_url={data['browser_download_url']}")
          with open("upload_outputs.txt", "w", encoding="utf-8") as out:
              out.write(f"browser_download_url={data['browser_download_url']}\n")
          PY

          cat upload_outputs.txt >> "$GITHUB_OUTPUT"

      - name: Send file URL to Make webhook
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          MAKE_WEBHOOK_TOKEN: ${{ secrets.MAKE_WEBHOOK_TOKEN }}
          FILE_URL: ${{ steps.upload.outputs.browser_download_url }}
        run: |
          curl --fail --location \
            -X POST "$MAKE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg file_url "$FILE_URL" \
              --arg file_name "output.mp4" \
              --arg source "github-actions" \
              --arg workflow "${{ github.workflow }}" \
              --arg run_id "${{ github.run_id }}" \
              --arg repository "${{ github.repository }}" \
              '{
                file_url: $file_url,
                file_name: $file_name,
                source: $source,
                workflow: $workflow,
                run_id: $run_id,
                repository: $repository
              }')"

      - name: Upload artifact for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-video-debug
          path: |
            output.mp4
            upload_response.json